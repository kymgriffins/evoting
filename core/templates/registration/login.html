{% extends "core/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h3>Login</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
        <p class="mt-10">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </form>
</div>

<style>
    form p { margin-bottom: 15px; }
    form p label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    form p input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
    .errorlist { color: #dc3545; font-size: 0.85rem; list-style: none; }
</style>
{% endblock %}
