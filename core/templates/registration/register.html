{% extends "core/base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <h3>Register</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Register</button>
        <p class="mt-10">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </form>
</div>

<style>
    form p { margin-bottom: 15px; }
    form p label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    form p input, form p select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
    .helptext { display: block; font-size: 0.8rem; color: #666; margin-top: 3px; }
    .errorlist { color: #dc3545; font-size: 0.85rem; list-style: none; margin-bottom: 5px; }
</style>
{% endblock %}
