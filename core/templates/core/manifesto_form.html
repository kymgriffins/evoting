{% extends "core/base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Manifesto{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 40px auto;">
    <h3>{% if editing %}Edit Manifesto{% else %}New Manifesto Item{% endif %}</h3>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">{% if editing %}Update{% else %}Create{% endif %} Manifesto</button>
        <a href="{% url 'manage_manifestos' %}" class="btn btn-outline">Cancel</a>
    </form>
</div>
<style>
    form p { margin-bottom: 15px; }
    form p label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    form p input, form p select, form p textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }
</style>
{% endblock %}
