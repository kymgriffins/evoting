{% extends "core/base.html" %}
{% block title %}New Manifesto{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 40px auto;">
    <h3>New Manifesto Item</h3>
    <p class="mb-20" style="color:var(--text-muted); font-size:0.9rem;">Once created, manifestos are permanent. You can only add progress updates later.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex">
            <button type="submit" class="btn btn-success">Create Manifesto</button>
            <a href="{% url 'manage_manifestos' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
